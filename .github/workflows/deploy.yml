name: Deploy Secure Azure Function

on:
  push:
    branches:
      - main

jobs:

  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v3

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Infra Dev
        run: |
          az deployment group create \
            --resource-group rg-securefunc-dev \
            --template-file infra/main.bicep \
            --parameters projectName=securefuncdev

      - name: Deploy Function Code Dev
        uses: azure/functions-action@v1
        with:
          app-name: securefuncdev-func
          package: src/function_app

  deploy-prod:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - uses: actions/checkout@v3

      - uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Infra Prod
        run: |
          az deployment group create \
            --resource-group rg-securefunc-prod \
            --template-file infra/main.bicep \
            --parameters projectName=securefuncprod

      - name: Deploy Function Code Prod
        uses: azure/functions-action@v1
        with:
          app-name: securefuncprod-func
          package: src/function_app
